<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>A Letter For You · Rupa 💌</title>
  <meta name="description" content="A heartfelt birthday letter for Rupa." />
  <meta name="theme-color" content="#f5e6e8" />
  <meta property="og:title" content="A Letter For You · Rupa 💌" />

  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;1,400;1,500;1,600;1,700&family=Poppins:wght@200;300;400;500;600;700&family=Great+Vibes&family=Dancing+Script:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>

<body class="theme-rose">

  <!-- LOADER -->
  <div id="loader" class="loader" aria-hidden="true">
    <div class="loader__ring"></div>
    <div class="loader__heart" aria-hidden="true">💌</div>
    <p class="loader__text">Writing your letter…</p>
    <div class="loader__bar"><div class="loader__bar-fill" id="loaderBar"></div></div>
  </div>

  <!-- SCROLL PROGRESS -->
  <div id="progressBar" class="progress-bar" aria-hidden="true"></div>

  <!-- DECORATIONS -->
  <div class="atmosphere" id="atmosphere" aria-hidden="true"></div>
  <div class="floating-hearts" id="floatingHearts" aria-hidden="true"></div>

  <!-- NAVIGATION -->
  <header class="nav" id="nav" role="banner">
    <a href="index.html" class="nav__brand">
      <span class="nav__brand-icon">✦</span>
      Rupa&rsquo;s Day
    </a>
    <button class="nav__toggle" id="navToggle" aria-label="Toggle navigation" aria-expanded="false" aria-controls="navLinks">
      <span></span><span></span><span></span>
    </button>
    <nav class="nav__links" id="navLinks" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="memories.html">Memories</a>
      <a href="reasons.html">Reasons</a>
      <a href="wishes.html" class="is-active" aria-current="page">Wishes</a>
      <a href="surprise.html">Surprise</a>
    </nav>
  </header>

  <!-- MAIN -->
  <main class="page" id="mainContent">
    <section class="section section--centered" aria-label="Birthday letter">

      <!-- LETTER -->
      <div class="letter letter--handwritten reveal" id="letterContainer">
        <div class="letter__glow" aria-hidden="true"></div>
        <div class="letter__seal" aria-hidden="true">
          <span class="letter__seal-icon">❤</span>
        </div>

        <h1 class="letter__title">Happy Birthday, Rupa</h1>

        <div class="letter__body-wrapper">
          <div class="letter__body" id="typewriter" role="article" aria-label="Birthday letter"></div>
          <span class="letter__cursor" id="typewriterCursor" aria-hidden="true">|</span>
        </div>

        <div class="letter__controls">
          <button class="letter__control-btn" id="typewriterSkip" aria-label="Skip typing and reveal full letter">
            Skip <span aria-hidden="true">→</span>
          </button>
          <span class="letter__progress" id="typewriterProgress" aria-hidden="true"></span>
        </div>

        <div class="letter__divider" aria-hidden="true">
          <span class="letter__divider-line"></span>
          <span class="letter__divider-icon">❦</span>
          <span class="letter__divider-line"></span>
        </div>

        <div class="letter__signature">
          <p class="letter__from">With warmest wishes,</p>
          <p class="letter__name">Emroj</p>
        </div>
      </div>

      <!-- CTA -->
      <div class="section__cta reveal">
        <a href="surprise.html" class="btn btn--primary btn--glow btn--pulse">
          <span class="btn__text">Open Your Surprise</span>
          <span class="btn__icon" aria-hidden="true">🎁</span>
        </a>
      </div>

    </section>

    <!-- FOOTER -->
    <footer class="footer" role="contentinfo">
      <p>Made with <span class="footer__heart" aria-hidden="true">❤</span> just for you, Rupa.</p>
      <button class="footer__secret" id="secretHeart" aria-label="Reveal a secret message" title="Click for a secret">
        <span aria-hidden="true">♡</span>
      </button>
    </footer>
  </main>

  <!-- MUSIC PLAYER -->
  <audio id="bgMusic" src="music/birthday-song.mp3" loop preload="metadata"></audio>
  <div class="music" id="musicPlayer" role="complementary" aria-label="Music player">
    <button class="music__btn" id="musicToggle" aria-label="Play background music">
      <span class="music__icon" id="musicIcon" aria-hidden="true">🎵</span>
      <span class="music__pulse" aria-hidden="true"></span>
    </button>
    <div class="music__info">
      <span class="music__tooltip" id="musicTooltip">Play music</span>
      <div class="music__progress" role="slider" aria-label="Music progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="music__progress-fill" id="musicProgress"></div>
      </div>
    </div>
  </div>

  <!-- BACK TO TOP -->
  <button class="to-top" id="toTop" aria-label="Scroll back to top" title="Back to top">
    <span aria-hidden="true">↑</span>
  </button>

  <!-- SECRET MODAL -->
  <div class="secret-modal" id="secretModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="secretTitle">
    <div class="secret-modal__overlay"></div>
    <div class="secret-modal__card">
      <button class="secret-modal__close" id="secretClose" aria-label="Close secret message">
        <span aria-hidden="true">×</span>
      </button>
      <div class="secret-modal__icon" aria-hidden="true">✨</div>
      <h3 id="secretTitle">A little secret…</h3>
      <p>Read the letter again whenever you forget how loved you are. <span aria-hidden="true">💖</span></p>
      <div class="secret-modal__sparkles" aria-hidden="true">
        <span>✦</span><span>✦</span><span>✦</span>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
